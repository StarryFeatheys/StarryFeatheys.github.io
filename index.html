<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;p&gt;&lt;strong&gt;一、信息茧房的定义与本质&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;信息茧房指的是人们的信息获取往往会被自己的兴趣所引导，从而将自己束缚在一个狭窄的信息空间里。其本质是一种共鸣（或共情）成瘾，我们只愿意看到自己想看到的，而对另一面的观点和想法选择性忽视。&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;二、如何打破信息茧房&lt;/strong&gt;&lt;/p&gt;

&lt;p&gt;🎯 培养批判性思维&lt;br&gt;

&lt;p&gt;在深入思考信息茧房这一现象后，我深刻认识到它对个人成长和社会发展的阻碍。我们生活在一个多元且复杂的世界中，不能被自己的偏好和偏见所蒙蔽。&lt;/p&gt;
&lt;p&gt;打破信息茧房需要我们有勇气面对不同的声音，有决心改变固有的习惯。只有这样，我们才能不断丰富自己的认知，提升思考能力，以更加全面和客观的视角去理解这个世界。&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;让我们共同努力，挣脱信息茧房的束缚，拥抱更广阔、更多元的世界！&lt;/p&gt;

      <div class="item">
        <a class="result-title" href="https://StarryFeatheys.github.io/post/xue-xi-de-ben-zhi-ji-zhi-de-chong-fu-yu-jian-chi/"" data-c="
          &lt;p&gt;&lt;strong&gt;学习，一场与自我的深度对话，其本质究竟为何？答案呼之欲出：极致的重复与坚持。&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;💡&lt;strong&gt;如何做到有效的重复？&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;🎯 第一、批判思考，温故而知新&lt;/p&gt;
&lt;p&gt;每次重复学习时，都要进行批判思考，温故而知新。从已学的知识点中挖掘新的认知。每一次的重复，都能让我们的理解更深入，这便是构建知识体系的过程。&lt;/p&gt;
&lt;p&gt;🎯 第二、多种重复形式互相结合&lt;/p&gt;
&lt;p&gt;仅仅依靠笔记或口头表述是远远不够的，要将听、说、读、写充分调动起来，相互融合。通过坚持不懈的重复，积累数量，方能彰显质量。&lt;/p&gt;
&lt;p&gt;🎯 第三：间隔式重复&lt;/p&gt;
&lt;p&gt;若想将知识转化为长期记忆，集中式重复仅对短期记忆有所助益，考前临时抱佛脚便是典型例子。间隔式重复则需依据所学知识点及自身时间安排，灵活调整重复的次数与频率。艾宾浩斯遗忘曲线，恰如其分地揭示了这一记忆规律。&lt;/p&gt;
&lt;p&gt;🎯 第四：大量应用&lt;/p&gt;
&lt;p&gt;让知识“活”起来！学习绝非单纯的记忆，关键在于运用掌握的知识点去化解一个个具体难题。在应用过程中，进一步深化对知识的领悟。&lt;/p&gt;
&lt;p&gt;罗振宇曾言：成功＝核心算法 x 大量重复动作的平方。他说道：“人生算法乃是在面对世界时，不断重复的最基本套路，找到它、重复它、强化它、优化它，直至大脑能够随心运用。”&lt;/p&gt;
&lt;p&gt;记性欠佳？那就勤做笔记。毕竟，好记性不如烂笔头。智商平平？那就笨鸟先飞，且要多飞，坚持到底方为贵。&lt;/p&gt;
&lt;p&gt;学习的本质在于：重复、重复、极致重复，坚持、坚持、极致坚持，直至熟能生巧、巧能运用，最终形成肌肉记忆。重复，乃是培育自律和毅力的必经之路。唯有通过持续不断的学习、锲而不舍的坚持，方能战胜重重困难，砥砺前行。&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;作家托尔斯泰讲道：“最易之事乃为贫乏与失败，唯有凭借持之以恒的努力、坚持和重复，我们方可斩获成功。”&lt;/p&gt;
&lt;/blockquote&gt;
&lt;hr&gt;
&lt;p&gt;学习之旅或许荆棘丛生，但只要我们将重复与坚持铭记于心，付诸实践，就必定能采撷知识的丰硕果实，迈向成功的康庄大道。让我们在求知的漫漫征途中，披荆斩棘，勇往直前，以重复和坚持谱写属于自己的璀璨华章！&lt;/p&gt;
&lt;hr&gt;

          &lt;p&gt;从水中倒影看世界，仿佛窥见另一个维度。&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;倒影中的景象，既真实又虚幻。&lt;/strong&gt; 水波荡漾间，熟悉的景物变得扭曲而神秘，像是被施了魔法的画卷。这种虚幻之美，让我们意识到，眼中的现实并非唯一的真相。&lt;/p&gt;
&lt;p&gt;换个角度看待生活，或许会发现不一样的美。就如同在困境中，我们若能转换视角，不再执着于眼前的艰难，而是从挫折中寻找成长的契机，往往能收获意想不到的感悟。&lt;/p&gt;
&lt;p&gt;正如水中倒影，逆境中的反思就像是那平静水面下的深沉思考。它让我们有机会审视自己的内心，重新评估所面临的挑战。&lt;/p&gt;
&lt;hr&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://StarryFeatheys.github.io/post-images/1729687475164.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://StarryFeatheys.github.io/post-images/1729687483637.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://StarryFeatheys.github.io/post-images/1729687492053.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;hr&gt;
&lt;p&gt;愿我们都能拥有转换视角的勇气和智慧，在生活的波澜中，发现那隐藏在平凡背后的绚烂光芒。&lt;/p&gt;

  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;在这个信息爆炸的时代，我们看似身处信息的海洋，却常常被困在“信息茧房”之中。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;一、信息茧房的定义与本质&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;信息茧房指的是人们的信息获取往往会被自己的兴趣所引导，从而将自己束缚在一个狭窄的信息空间里。其本质是一种共鸣（或共情）成瘾，我们只愿意看到自己想看到的，而对另一面的观点和想法选择性忽视。&lt;/p&gt;\n&lt;p&gt;这种现象的危害不容小觑。它不仅限制了我们的视野，使我们难以接触到多元的观点和信息，导致思维的狭隘和偏见的加深，还让我们失去了对复杂世界全面、客观的认知和理解能力。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;二、如何打破信息茧房&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;🎯 主动拓展知识领域&lt;br&gt;\n勇敢地跳出自己熟悉的舒适区，积极探索未曾涉足的知识领域，拓宽视野。&lt;/p&gt;\n&lt;p&gt;🎯 多元化信息渠道&lt;br&gt;\n广泛关注不同类型、不同风格的权威媒体和信息源，避免信息来源的单一化。&lt;/p&gt;\n&lt;p&gt;🎯 积极参与观点碰撞&lt;br&gt;\n热情参与各种有深度、有不同观点交锋的讨论，以开放的心态倾听和理解他人的看法。&lt;/p&gt;\n&lt;p&gt;🎯 培养批判性思维&lt;br&gt;\n对接收的信息保持警惕，深入思考、分析，不盲目跟从，敢于质疑和挑战固有观念。&lt;/p&gt;\n&lt;p&gt;🎯 定期自我反思与调整&lt;br&gt;\n时常审视自己的信息获取习惯和认知偏见，发现问题及时改进。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;三、个人总结&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;在深入思考信息茧房这一现象后，我深刻认识到它对个人成长和社会发展的阻碍。我们生活在一个多元且复杂的世界中，不能被自己的偏好和偏见所蒙蔽。&lt;/p&gt;\n&lt;p&gt;打破信息茧房需要我们有勇气面对不同的声音，有决心改变固有的习惯。只有这样，我们才能不断丰富自己的认知，提升思考能力，以更加全面和客观的视角去理解这个世界。&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;让我们共同努力，挣脱信息茧房的束缚，拥抱更广阔、更多元的世界！&lt;/p&gt;\n&lt;hr&gt;\n&#34;,&#34;fileName&#34;:&#34;ru-he-da-po-xin-xi-chong-fang&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;如何打破信息茧房&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2024-10-23 21:48:16&#34;,&#34;dateFormat&#34;:&#34;2024-10-23&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://StarryFeatheys.github.io/post/ru-he-da-po-xin-xi-chong-fang/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:114000,&#34;words&#34;:574,&#34;minutes&#34;:2},&#34;description&#34;:&#34;在这个信息爆炸的时代，我们看似身处信息的海洋，却常常被困在“信息茧房”之中。\n一、信息茧房的定义与本质\n信息茧房指的是人们的信息获取往往会被自己的兴趣所引导，从而将自己束缚在一个狭窄的信息空间里。其本质是一种共鸣（或共情）成瘾，我们只愿意看...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;&lt;strong&gt;学习，一场与自我的深度对话，其本质究竟为何？答案呼之欲出：极致的重复与坚持。&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;💡&lt;strong&gt;如何做到有效的重复？&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;🎯 第一、批判思考，温故而知新&lt;/p&gt;\n&lt;p&gt;每次重复学习时，都要进行批判思考，温故而知新。从已学的知识点中挖掘新的认知。每一次的重复，都能让我们的理解更深入，这便是构建知识体系的过程。&lt;/p&gt;\n&lt;p&gt;🎯 第二、多种重复形式互相结合&lt;/p&gt;\n&lt;p&gt;仅仅依靠笔记或口头表述是远远不够的，要将听、说、读、写充分调动起来，相互融合。通过坚持不懈的重复，积累数量，方能彰显质量。&lt;/p&gt;\n&lt;p&gt;🎯 第三：间隔式重复&lt;/p&gt;\n&lt;p&gt;若想将知识转化为长期记忆，集中式重复仅对短期记忆有所助益，考前临时抱佛脚便是典型例子。间隔式重复则需依据所学知识点及自身时间安排，灵活调整重复的次数与频率。艾宾浩斯遗忘曲线，恰如其分地揭示了这一记忆规律。&lt;/p&gt;\n&lt;p&gt;🎯 第四：大量应用&lt;/p&gt;\n&lt;p&gt;让知识“活”起来！学习绝非单纯的记忆，关键在于运用掌握的知识点去化解一个个具体难题。在应用过程中，进一步深化对知识的领悟。&lt;/p&gt;\n&lt;p&gt;罗振宇曾言：成功＝核心算法 x 大量重复动作的平方。他说道：“人生算法乃是在面对世界时，不断重复的最基本套路，找到它、重复它、强化它、优化它，直至大脑能够随心运用。”&lt;/p&gt;\n&lt;p&gt;记性欠佳？那就勤做笔记。毕竟，好记性不如烂笔头。智商平平？那就笨鸟先飞，且要多飞，坚持到底方为贵。&lt;/p&gt;\n&lt;p&gt;学习的本质在于：重复、重复、极致重复，坚持、坚持、极致坚持，直至熟能生巧、巧能运用，最终形成肌肉记忆。重复，乃是培育自律和毅力的必经之路。唯有通过持续不断的学习、锲而不舍的坚持，方能战胜重重困难，砥砺前行。&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;作家托尔斯泰讲道：“最易之事乃为贫乏与失败，唯有凭借持之以恒的努力、坚持和重复，我们方可斩获成功。”&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;p&gt;学习之旅或许荆棘丛生，但只要我们将重复与坚持铭记于心，付诸实践，就必定能采撷知识的丰硕果实，迈向成功的康庄大道。让我们在求知的漫漫征途中，披荆斩棘，勇往直前，以重复和坚持谱写属于自己的璀璨华章！&lt;/p&gt;\n&lt;hr&gt;\n&#34;,&#34;fileName&#34;:&#34;xue-xi-de-ben-zhi-ji-zhi-de-chong-fu-yu-jian-chi&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;学习的本质：极致的重复与坚持&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2024-10-23 21:27:29&#34;,&#34;dateFormat&#34;:&#34;2024-10-23&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://StarryFeatheys.github.io/post/xue-xi-de-ben-zhi-ji-zhi-de-chong-fu-yu-jian-chi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:133000,&#34;words&#34;:669,&#34;minutes&#34;:3},&#34;description&#34;:&#34;学习，一场与自我的深度对话，其本质究竟为何？答案呼之欲出：极致的重复与坚持。\n💡如何做到有效的重复？\n🎯 第一、批判思考，温故而知新\n每次重复学习时，都要进行批判思考，温故而知新。从已学的知识点中挖掘新的认知。每一次的重复，都能让我们的...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;从水中倒影看世界，仿佛窥见另一个维度。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;倒影中的景象，既真实又虚幻。&lt;/strong&gt; 水波荡漾间，熟悉的景物变得扭曲而神秘，像是被施了魔法的画卷。这种虚幻之美，让我们意识到，眼中的现实并非唯一的真相。&lt;/p&gt;\n&lt;p&gt;换个角度看待生活，或许会发现不一样的美。就如同在困境中，我们若能转换视角，不再执着于眼前的艰难，而是从挫折中寻找成长的契机，往往能收获意想不到的感悟。&lt;/p&gt;\n&lt;p&gt;正如水中倒影，逆境中的反思就像是那平静水面下的深沉思考。它让我们有机会审视自己的内心，重新评估所面临的挑战。&lt;/p&gt;\n&lt;hr&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://StarryFeatheys.github.io/post-images/1729687475164.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://StarryFeatheys.github.io/post-images/1729687483637.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://StarryFeatheys.github.io/post-images/1729687492053.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;hr&gt;\n&lt;p&gt;愿我们都能拥有转换视角的勇气和智慧，在生活的波澜中，发现那隐藏在平凡背后的绚烂光芒。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;huan-ge-jiao-du-shi-jie-jiang-bu-tong&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;换个角度，世界将不同&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2024-10-23 20:32:04&#34;,&#34;dateFormat&#34;:&#34;2024-10-23&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://StarryFeatheys.github.io/post/huan-ge-jiao-du-shi-jie-jiang-bu-tong/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:47000,&#34;words&#34;:237,&#34;minutes&#34;:1},&#34;description&#34;:&#34;从水中倒影看世界，仿佛窥见另一个维度。\n倒影中的景象，既真实又虚幻。 水波荡漾间，熟悉的景物变得扭曲而神秘，像是被施了魔法的画卷。这种虚幻之美，让我们意识到，眼中的现实并非唯一的真相。\n换个角度看待生活，或许会发现不一样的美。就如同在困境中...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;h1 id=\&#34;漫步在astra的博客世界\&#34;&gt;漫步在「Astra」的博客世界&lt;/h1&gt;\n&lt;p&gt;&lt;strong&gt;博主&lt;/strong&gt;：建辉&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;兴趣爱好&lt;/strong&gt;：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;心向自由，兴趣随心而生，所爱皆可学。\n&lt;ul&gt;\n&lt;li&gt;运动，是身体与灵魂的共舞，在汗水挥洒中感受生命的律动。&lt;/li&gt;\n&lt;li&gt;摄影，是时光的定格，用镜头捕捉世间的美好瞬间。&lt;/li&gt;\n&l
